version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: finflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - finflow-network

  frontend:
    build: ./finflow-frontend
    container_name: finflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - finflow-network

  api-gateway:
    build: ./services/api-gateway
    container_name: finflow-api-gateway
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - finflow-network

  user-service:
    build: ./services/user-service
    container_name: finflow-user-service
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - finflow-network

  transaction-service:
    build: ./services/transaction-service
    container_name: finflow-transaction-service
    ports:
      - "5003:5003"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - finflow-network

  wallet-service:
    build: ./services/wallet-service
    container_name: finflow-wallet-service
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - finflow-network

volumes:
  mongodb_data:

networks:
  finflow-network:
    driver: bridge